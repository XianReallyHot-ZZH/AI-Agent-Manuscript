<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Agent 项目拆解路线图</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&amp;family=Lora:wght@400;500;600&amp;family=Poppins:wght@500;600;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.6.1/dist/reveal.css">

  <style>
    :root {
      --bg: #f2dfb2;
      --bg-2: #f7ebca;
      --surface: #fff8e7;
      --surface-2: #f8edcc;
      --text: #2d261f;
      --muted: #6e6254;
      --line: rgba(103, 86, 63, 0.22);
      --orange: #c96442;
      --blue: #4f789d;
      --green: #657f4f;
      --plum: #866078;
      --accent: var(--orange);
      --font-heading: 'Poppins', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      --font-body: 'Lora', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', Georgia, serif;
      --font-code: 'JetBrains Mono', 'Fira Code', 'Menlo', monospace;
    }

    html,
    body {
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .reveal {
      font-family: var(--font-body);
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(255, 250, 232, 0.52), rgba(242, 223, 178, 0.9)),
        var(--bg);
    }

    .reveal .slides {
      text-align: left;
    }

    .reveal section {
      --accent: var(--orange);
      box-sizing: border-box;
      height: 100%;
      padding: 52px 62px 90px;
    }

    .reveal section[data-part="2"] { --accent: var(--orange); }
    .reveal section[data-part="3"] { --accent: var(--blue); }
    .reveal section[data-part="4"] { --accent: var(--green); }
    .reveal section[data-part="5"] { --accent: var(--plum); }

    .reveal h1,
    .reveal h2,
    .reveal h3 {
      font-family: var(--font-heading);
      letter-spacing: 0;
      color: var(--text);
      margin: 0;
      line-height: 1.08;
      text-transform: none;
    }

    .reveal h1 {
      font-size: 3.05em;
      font-weight: 700;
      max-width: 1120px;
    }

    .reveal h2 {
      font-size: 1.46em;
      font-weight: 650;
      margin-bottom: 22px;
    }

    .reveal h3 {
      font-size: 0.62em;
      color: var(--accent);
      font-weight: 650;
      margin-bottom: 8px;
    }

    .eyebrow {
      font-family: var(--font-heading);
      color: var(--accent);
      font-size: 0.45em;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .subtitle,
    .lead {
      color: var(--muted);
      font-size: 0.82em;
      line-height: 1.5;
      max-width: 980px;
      margin-top: 24px;
    }

    .lead {
      color: var(--text);
      font-size: 0.95em;
    }

    .accent {
      color: var(--accent);
    }

    .chapter {
      padding-top: 118px;
    }

    .chapter h2 {
      font-size: 2.36em;
      max-width: 1100px;
    }

    .chapter-line {
      width: 170px;
      height: 6px;
      background: var(--accent);
      margin-top: 34px;
      border-radius: 999px;
    }

    .layout-2,
    .layout-3,
    .layout-4 {
      display: grid;
      gap: 18px;
      align-items: stretch;
    }

    .layout-2 { grid-template-columns: repeat(2, 1fr); }
    .layout-3 { grid-template-columns: repeat(3, 1fr); }
    .layout-4 { grid-template-columns: repeat(4, 1fr); }

    .panel,
    .session-card,
    .code-ref,
    .diagram-box {
      background: rgba(255, 248, 231, 0.74);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 14px 34px rgba(82, 60, 35, 0.08);
    }

    .panel {
      padding: 20px 22px;
    }

    .panel p {
      margin: 0;
      color: var(--muted);
      font-size: 0.62em;
      line-height: 1.45;
    }

    .panel strong {
      color: var(--text);
      font-family: var(--font-heading);
      font-weight: 650;
    }

    .route {
      display: grid;
      grid-template-columns: 1fr 34px 1fr 34px 1fr;
      gap: 14px;
      align-items: center;
      margin-top: 30px;
    }

    .arrow {
      text-align: center;
      color: var(--accent);
      font-family: var(--font-heading);
      font-size: 0.82em;
      font-weight: 700;
    }

    .session-head {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 18px;
      align-items: start;
      margin-bottom: 20px;
    }

    .session-no {
      font-family: var(--font-heading);
      font-size: 1.28em;
      line-height: 1;
      color: var(--accent);
      font-weight: 700;
      border-top: 5px solid var(--accent);
      padding-top: 12px;
    }

    .session-subtitle {
      color: var(--muted);
      font-size: 0.62em;
      line-height: 1.42;
      margin-top: 9px;
    }

    .session-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 13px;
    }

    .session-card {
      min-height: 112px;
      padding: 16px 16px;
    }

    .session-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.5em;
      line-height: 1.43;
    }

    .code-ref {
      margin-top: 12px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 1.1fr 1.6fr;
      gap: 18px;
      align-items: center;
    }

    .code-ref .path {
      font-family: var(--font-code);
      font-size: 0.42em;
      line-height: 1.35;
      color: var(--muted);
      word-break: break-all;
    }

    .code-ref code {
      font-family: var(--font-code);
      display: block;
      color: var(--text);
      background: rgba(201, 100, 66, 0.09);
      border-left: 4px solid var(--accent);
      padding: 10px 12px;
      border-radius: 0 6px 6px 0;
      font-size: 0.48em;
      line-height: 1.35;
      white-space: normal;
    }

    .diagram-mini {
      margin-top: 12px;
      padding: 12px 14px 13px;
      border: 1px solid rgba(103, 86, 63, 0.24);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 252, 239, 0.8), rgba(248, 237, 204, 0.72));
      box-shadow: 0 12px 28px rgba(82, 60, 35, 0.07);
    }

    .diagram-mini-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 9px;
    }

    .diagram-mini-title {
      font-family: var(--font-heading);
      color: var(--accent);
      font-size: 0.46em;
      font-weight: 700;
    }

    .diagram-mini-caption {
      color: var(--muted);
      font-size: 0.42em;
      line-height: 1.3;
      text-align: right;
    }

    .mini-flow {
      display: flex;
      align-items: stretch;
      gap: 7px;
    }

    .mini-node,
    .mini-lane,
    .mini-stack-item {
      border: 1px solid var(--line);
      background: rgba(255, 248, 231, 0.78);
      border-radius: 7px;
      color: var(--text);
    }

    .mini-node {
      flex: 1 1 0;
      min-width: 0;
      min-height: 43px;
      padding: 8px 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: var(--font-heading);
      font-size: 0.4em;
      font-weight: 650;
      line-height: 1.22;
    }

    .mini-node.primary,
    .mini-lane.primary,
    .mini-stack-item.primary {
      border-color: color-mix(in srgb, var(--accent), transparent 22%);
      background: color-mix(in srgb, var(--accent), #fff8e7 88%);
    }

    .mini-arrow {
      align-self: center;
      color: var(--accent);
      font-family: var(--font-heading);
      font-size: 0.4em;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .mini-lanes {
      display: grid;
      grid-template-columns: repeat(var(--lane-count), minmax(0, 1fr));
      gap: 8px;
    }

    .mini-lane {
      padding: 8px 9px;
      min-height: 58px;
    }

    .mini-lane-title {
      font-family: var(--font-heading);
      color: var(--accent);
      font-size: 0.38em;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .mini-lane-step {
      color: var(--muted);
      font-size: 0.38em;
      line-height: 1.24;
      margin-top: 3px;
    }

    .mini-stack {
      display: grid;
      grid-template-columns: repeat(var(--stack-count), minmax(0, 1fr));
      gap: 8px;
    }

    .mini-stack-item {
      padding: 8px 9px;
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: var(--font-heading);
      font-size: 0.39em;
      font-weight: 650;
      line-height: 1.22;
    }

    .diagram-box {
      padding: 20px;
      margin-top: 20px;
    }

    .diagram-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      align-items: stretch;
    }

    .diagram-row.three { grid-template-columns: repeat(3, 1fr); }
    .diagram-row.six { grid-template-columns: repeat(6, 1fr); }

    .node {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(248, 237, 204, 0.66);
      padding: 14px 14px;
      min-height: 96px;
    }

    .node.primary {
      border-color: var(--accent);
    }

    .node-title {
      font-family: var(--font-heading);
      color: var(--accent);
      font-size: 0.52em;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .node p {
      margin: 0;
      color: var(--muted);
      font-size: 0.5em;
      line-height: 1.36;
    }

    .takeaway {
      border-left: 5px solid var(--accent);
      background: rgba(255, 248, 231, 0.66);
      border-radius: 0 8px 8px 0;
      padding: 15px 18px;
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.6em;
      line-height: 1.42;
    }

    .takeaway strong {
      color: var(--text);
      font-family: var(--font-heading);
      font-weight: 650;
    }

    .source {
      font-family: var(--font-code);
      color: var(--muted);
      font-size: 0.42em;
      line-height: 1.35;
      margin-top: 10px;
      word-break: break-all;
    }

    .stack-list {
      display: grid;
      gap: 10px;
      margin-top: 20px;
    }

    .stack-item {
      display: grid;
      grid-template-columns: 160px 1fr 1.2fr;
      gap: 12px;
      align-items: stretch;
    }

    .stack-item > div {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 248, 231, 0.72);
      padding: 12px 14px;
      color: var(--muted);
      font-size: 0.52em;
      line-height: 1.38;
    }

    .stack-item .label {
      color: var(--accent);
      font-family: var(--font-heading);
      font-weight: 700;
    }

    .slide-footer {
      position: absolute;
      left: 62px;
      right: 62px;
      bottom: 28px;
      border-top: 1px solid var(--line);
      padding-top: 10px;
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-family: var(--font-heading);
      font-size: 0.38em;
    }

    .slide-footer .part-label {
      color: var(--accent);
      font-weight: 650;
    }

    .deck-progress {
      position: fixed;
      left: 0;
      bottom: 0;
      height: 4px;
      width: 0;
      background: var(--orange);
      z-index: 30;
    }

    .reveal .controls {
      color: var(--accent);
    }

    @media (max-width: 760px) {
      .reveal section {
        padding: 42px 36px 82px;
      }
      .chapter {
        padding-top: 92px;
      }
      .chapter h2 {
        font-size: 1.58em;
      }
      .layout-2,
      .layout-3,
      .layout-4,
      .route,
      .session-grid,
      .code-ref,
      .diagram-row,
      .diagram-row.three,
      .diagram-row.six,
      .mini-flow,
      .mini-lanes,
      .mini-stack,
      .stack-item {
        grid-template-columns: 1fr;
      }
      .mini-flow {
        flex-direction: column;
      }
      .mini-arrow {
        transform: rotate(90deg);
      }
      .diagram-mini-caption {
        text-align: left;
      }
      .arrow {
        transform: rotate(90deg);
      }
      .session-head {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .session-card {
        min-height: auto;
      }
      .slide-footer {
        left: 36px;
        right: 36px;
      }
    }
  </style>
</head>

<body>
  <div class="deck-progress"></div>
  <div class="reveal">
    <div class="slides"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.6.1/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.6.1/plugin/notes/notes.js"></script>
  <script>
    const partNames = {
      "1": "开场地图",
      "2": "AI-Agent-ZeroToOne",
      "3": "OpenClaw light-claw-4j",
      "4": "enterprise-claw-4j",
      "5": "收束与 Q&A"
    };

    const aiSessions = [
      {
        no: "S01",
        title: "5 行循环：先让模型会“转一圈”",
        subtitle: "The Agent Loop",
        knowledge: "Agent 不是神秘对象，而是消息、模型调用、stop_reason 和 tool_result 组成的闭环。",
        model: "看见上下文 -> 调模型 -> 判断是否工具调用 -> 写回结果 -> 下一轮。",
        arch: "智能在模型里，Harness 只负责把输入、工具和结果排成稳定协议。",
        code: "private static void agentLoop(AnthropicClient client, LoopState state)",
        source: "vendors/AI-Agent-ZeroToOne/mini-agent-4j/src/main/java/com/example/agent/sessions/S01AgentLoop.java:331"
      },
      {
        no: "S02",
        title: "给模型装上双手：工具分发从 Map 开始",
        subtitle: "Tool Use",
        knowledge: "模型输出 tool_use，系统根据工具名找到 handler，并把结果包装回消息流。",
        model: "工具不是普通函数；它是模型可请求、系统可治理的外部能力。",
        arch: "Schema 面向模型，Handler 面向真实世界，二者用工具名连接。",
        code: "Map&lt;String, Function&lt;Map&lt;String, Object&gt;, String&gt;&gt; toolHandlers",
        source: "vendors/AI-Agent-ZeroToOne/mini-agent-4j/src/main/java/com/example/agent/sessions/S02ToolUse.java:741-745"
      },
      {
        no: "S03",
        title: "你的 Agent 为什么跑偏？先把计划写出来",
        subtitle: "TodoWrite",
        knowledge: "TodoWrite 把长任务进度从模型隐式记忆变成可检查的外部状态。",
        model: "不要让模型“记得自己正在做什么”，让它每轮都能读到当前计划。",
        arch: "PlanningState 记录 items 与 rounds_since_update，Nag Reminder 负责把偏航拉回来。",
        code: "static class PlanningState; private static class PlanItem",
        source: "vendors/AI-Agent-ZeroToOne/mini-agent-4j/src/main/java/com/example/agent/sessions/S03TodoWrite.java:132,380"
      },
      {
        no: "S04",
        title: "开一个干净脑袋：Subagent 是上下文隔离",
        subtitle: "Subagents",
        knowledge: "复杂探索不要污染主对话，子 Agent 用独立消息列表处理子问题。",
        model: "父 Agent 提任务，子 Agent 自己探索，只把结论摘要带回来。",
        arch: "这是从单进程循环走向多 Agent 协作的第一步：先隔离上下文，再谈并行。",
        code: "S04Subagent + 子 Agent 专用 TOOL_HANDLERS 子集",
        source: "vendors/AI-Agent-ZeroToOne/mini-agent-4j/src/main/java/com/example/agent/sessions/S04Subagent.java:54,565"
      },
      {
        no: "S05",
        title: "知识别一次塞满：Skill 先给目录，再给正文",
        subtitle: "Skill Loading",
        knowledge: "Skill 解决“知识太多但当前只需要一小块”的问题。",
        model: "先注入技能清单；模型需要细节时，再调用 load_skill 读取正文。",
        arch: "两层知识注入降低上下文噪声，也让领域知识可以按目录维护。",
        code: "TOOL_HANDLERS.put(\"load_skill\", input -> ...)",
        source: "vendors/AI-Agent-ZeroToOne/mini-agent-4j/src/main/java/com/example/agent/sessions/S05SkillLoading.java:520-537"
      },
      {
        no: "S06",
        title: "失忆不是模型变笨：Compact 是交接文档",
        subtitle: "Context Compact",
        knowledge: "窗口压力出现时，不是丢历史，而是保留目标、事实、决策和未完成动作。",
        model: "大工具结果先落盘，旧输出微压缩，历史过长再整体压缩。",
        arch: "CompactState 把最近文件、压缩次数和持久化输出标记组织起来。",
        code: "static class CompactState; private static void agentLoop(..., CompactState compactState)",
        source: "vendors/AI-Agent-ZeroToOne/mini-agent-4j/src/main/java/com/example/agent/sessions/S06ContextCompact.java:444,769"
      },
      {
        no: "S07",
        title: "工具越强，刹车越要早：权限系统接管副作用",
        subtitle: "Permission System",
        knowledge: "权限系统在工具执行前做 deny、mode、allow、ask 的决策。",
        model: "模型可以提出意图，但是否真的执行由系统边界决定。",
        arch: "把危险操作集中到一条权限管线，避免每个 handler 自己写散乱 if。",
        code: "S07PermissionSystem.agentLoop(...); TOOL_HANDLERS",
        source: "vendors/AI-Agent-ZeroToOne/mini-agent-4j/src/main/java/com/example/agent/sessions/S07PermissionSystem.java:904,1061"
      },
      {
        no: "S08",
        title: "别把扩展写进主循环：Hook 是生命周期插槽",
        subtitle: "Hook System",
        knowledge: "Hook 让 PreToolUse、PostToolUse 等扩展点有统一事件和返回结构。",
        model: "主循环不关心谁在旁边观察，只负责在固定时机发事件。",
        arch: "HookRunner 把横切逻辑从工具执行里拆出来，审计、改写、拦截都能挂载。",
        code: "S08HookSystem.agentLoop(...); HookEvent / HookResult / HookRunner",
        source: "vendors/AI-Agent-ZeroToOne/mini-agent-4j/src/main/java/com/example/agent/sessions/S08HookSystem.java:54,1064"
      },
      {
        no: "S09",
        title: "记忆不是聊天记录：只存跨会话还重要的事实",
        subtitle: "Memory System",
        knowledge: "Memory 解决跨会话事实、偏好、反馈和项目知识的持久保存。",
        model: "能重新推导的不存；会影响未来行为、且不容易重建的才存。",
        arch: "MemoryManager 用 frontmatter 文件组织记忆，并在系统提示词中按需注入。",
        code: "static class MemoryManager; private static final MemoryManager memoryMgr",
        source: "vendors/AI-Agent-ZeroToOne/mini-agent-4j/src/main/java/com/example/agent/sessions/S09MemorySystem.java:162,701"
      },
      {
        no: "S10",
        title: "System Prompt 不是一段文案：它是装配流水线",
        subtitle: "System Prompt Construction",
        knowledge: "身份、工具、记忆、环境、动态提醒不能混成一个不可维护的大字符串。",
        model: "稳定说明放 prompt block，临时事实放 reminder，消息流保留交互历史。",
        arch: "SystemPromptBuilder 把不同来源分段组装，便于测试、缓存和动态更新。",
        code: "static class SystemPromptBuilder; new SystemPromptBuilder(WORK_DIR, tools, model)",
        source: "vendors/AI-Agent-ZeroToOne/mini-agent-4j/src/main/java/com/example/agent/sessions/S10SystemPrompt.java:512,1123"
      },
      {
        no: "S11",
        title: "失败不可怕，可怕的是不知道失败到哪一步",

    function renderDiagram(diagram) {
      if (!diagram) return "";
      let content = "";
      if (diagram.type === "lanes") {
        const lanes = diagram.lanes || [];
        content = `<div class="mini-lanes" style="--lane-count:${lanes.length || 1}">` + lanes.map(function(lane, index) {
          const steps = (lane.steps || []).map(step => `<div class="mini-lane-step">${esc(step)}</div>`).join("");
          return `<div class="mini-lane${index === 0 ? " primary" : ""}">
            <div class="mini-lane-title">${esc(lane.label)}</div>
            ${steps}
          </div>`;
        }).join("") + `</div>`;
      } else if (diagram.type === "stack") {
        const items = diagram.items || [];
        content = `<div class="mini-stack" style="--stack-count:${Math.min(items.length || 1, 8)}">` + items.map(function(item, index) {
          return `<div class="mini-stack-item${index === 0 ? " primary" : ""}">${esc(item)}</div>`;
        }).join("") + `</div>`;
      } else {
        const steps = diagram.steps || [];
        content = `<div class="mini-flow">` + steps.map(function(step, index) {
          const arrow = index < steps.length - 1 ? `<div class="mini-arrow">-&gt;</div>` : "";
          return `<div class="mini-node${index === 0 ? " primary" : ""}">${esc(step)}</div>${arrow}`;
        }).join("") + `</div>`;
      }
      return `<div class="diagram-mini">
        <div class="diagram-mini-head">
          <div class="diagram-mini-title">${esc(diagram.title)}</div>
          <div class="diagram-mini-caption">${esc(diagram.caption || "")}</div>
        </div>
        ${content}
      </div>`;
    }

          <div class="arrow">-&gt;</div>
          <div class="panel"><h3>enterprise-claw-4j</h3><p><strong>最后看生产改造。</strong>同一套机制拆成 Spring Boot 模块、配置、健康检查和部署边界。</p></div>
        </div>
        <div class="takeaway"><strong>编排原则：</strong>每个项目内部按 session 顺序讲，让后一个 slide 像是从前一个自然长出来。</div>`,
        "告诉听众本次重构的关键：不再一开始融合两个项目，而是先完整走完一个学习路径。");

      slide("1", "为什么先讲 AI-Agent？因为它只问一个问题：Agent 怎么行动",
        `<div class="layout-3">
          <div class="panel"><h3>起点更小</h3><p>每课一个 Java 文件，不需要先理解 Gateway、平台适配或部署。</p></div>
          <div class="panel"><h3>反馈更直接</h3><p>Loop、Tool、Context、Permission 都能在一个 REPL 里看到效果。</p></div>
          <div class="panel"><h3>概念能累积</h3><p>从单 Agent 到多 Agent，每一课都给下一课制造真实问题。</p></div>
        </div>
        <div class="diagram-box">
          <div class="diagram-row">
            <div class="node primary"><div class="node-title">Loop</div><p>模型能转一轮</p></div>
            <div class="node"><div class="node-title">Tools</div><p>模型能行动</p></div>
            <div class="node primary"><div class="node-title">Context</div><p>模型能持续工作</p></div>
            <div class="node"><div class="node-title">Safety</div><p>行动有边界</p></div>
            <div class="node primary"><div class="node-title">Team</div><p>多个 Agent 协作</p></div>
          </div>
        </div>`,
        "这页承接路线图，解释为什么按 AI-Agent 先讲。");

      chapter("2", "Act I / Build The Agent Runtime", "第一幕：从 5 行循环长成一个会工作的 Agent", "AI-Agent-ZeroToOne 的 19 个 session 是一条很清楚的成长线：先让模型行动，再让它长期、可控、协作地行动。", "进入 AI-Agent 项目，不混 OpenClaw。");
      aiSessions.forEach(item => sessionSlide("2", "AI-Agent-ZeroToOne", item));

      chapter("3", "Act II / Build The Gateway", "第二幕：同一个 Agent，如何接进多平台世界", "OpenClaw light-claw-4j 不急着上 Spring Boot，而是用 10 个纯 Java session 把 Gateway 的每条工程边界讲清楚。", "进入 OpenClaw 教学项目。");
      lightSessions.forEach(item => sessionSlide("3", "OpenClaw light-claw-4j", item));

      chapter("4", "Act III / From Scripts To Services", "第三幕：生产化不是变复杂，是把边界拆清楚", "enterprise-claw-4j 把 light 版的机制拆成模块：入口、路由、运行时、智能装配、可靠性、并发、调度、部署。", "进入 enterprise。");
      enterpriseModules.forEach(item => moduleSlide("4", "OpenClaw enterprise-claw-4j", item));

      slide("5", "三条学习线终于合在一起了",
        `<div class="stack-list">
          <div class="stack-item"><div class="label">AI-Agent</div><div>学 Runtime</div><div>Loop、Tools、Context、Permission、Memory、Team、MCP。</div></div>
          <div class="stack-item"><div class="label">light-claw</div><div>学 Gateway</div><div>Channels、Routing、Sessions、Delivery、Resilience、Concurrency。</div></div>
          <div class="stack-item"><div class="label">enterprise-claw</div><div>学生产组织</div><div>Spring Boot 模块、配置、健康检查、部署和可运维边界。</div></div>
        </div>
        <div class="takeaway"><strong>不要把三个项目混成一锅。</strong>先按项目顺序学，最后再横向比较同一个机制在不同工程阶段的形态。</div>`,
        "总结重构后的学习路径。");

      slide("5", "复盘：同一套问题，在三个项目里逐步长大",
        `<div class="layout-4">
          <div class="panel"><h3>行动</h3><p>AI-Agent 用 Tool Dispatch 教模型如何行动；OpenClaw 用 Gateway 把行动接到多平台。</p></div>
          <div class="panel"><h3>记忆</h3><p>AI-Agent 先讲 Context 与 Memory；OpenClaw 再讲 Session、PromptAssembler 和混合检索。</p></div>
          <div class="panel"><h3>可靠</h3><p>AI-Agent 从 Permission、Hook、Recovery 起步；OpenClaw 补 WAL、Profile 轮换和 LaneQueue。</p></div>
          <div class="panel"><h3>协作</h3><p>AI-Agent 讲团队协议；enterprise 把多 Agent、渠道、健康检查和部署纳入服务边界。</p></div>
        </div>
        <div class="takeaway"><strong>最终心智模型：</strong>Agent Runtime 负责行动闭环，Agent Gateway 负责接入与路由，Enterprise 架构负责长期运行。</div>`,
        "帮助听众从项目顺序回到系统总图。");

      add(`<section data-part="5" class="chapter">
        <div class="eyebrow">Q&A</div>
        <h2>接下来你想深入哪条线？</h2>
        <p class="subtitle">Runtime 源码、Gateway 路由、生产模块、还是多 Agent 协作？这版 slides 的目标，是让每条线都有清晰入口。</p>
        <div class="chapter-line"></div>
        <aside class="notes">预留 5-8 分钟 Q&A。</aside>
      </section>`);
    }

    function annotateSlides() {
      const sections = Array.from(document.querySelectorAll(".reveal .slides > section"));
      sections.forEach(function(section) {
        const footer = document.createElement("div");
        footer.className = "slide-footer";
        const part = section.dataset.part || "1";
        const index = sections.indexOf(section) + 1;
        const left = document.createElement("span");
        left.className = "part-label";
        left.textContent = `Part ${part} / 5 · ${partNames[part] || ""}`;
        const right = document.createElement("span");
        right.textContent = `${index} / ${sections.length}`;
        footer.append(left, right);
        section.appendChild(footer);
      });
    }

    function currentAccent(slide) {
      const style = getComputedStyle(slide);
      return style.getPropertyValue("--accent").trim() || "#c96442";
    }

    function updateProgress(event) {
      const section = event.currentSlide || Reveal.getCurrentSlide();
      const all = Array.from(document.querySelectorAll(".reveal .slides > section"));
      const idx = all.indexOf(section);
      const progress = document.querySelector(".deck-progress");
      const pct = idx >= 0 ? ((idx + 1) / all.length) * 100 : 100;
      progress.style.width = `${pct}%`;
      progress.style.background = currentAccent(section);
    }

    buildDeck();
    annotateSlides();

    Reveal.initialize({
      hash: true,
      controls: true,
      progress: false,
      center: false,
      overview: true,
      width: 1366,
      height: 768,
      margin: 0.04,
      minScale: 0.2,
      maxScale: 1.35,
      plugins: [ RevealNotes ]
    }).then(function() {
      updateProgress({ currentSlide: Reveal.getCurrentSlide() });
    });

    Reveal.on("slidechanged", updateProgress);
    Reveal.on("ready", updateProgress);
  </script>
</body>
</html>
